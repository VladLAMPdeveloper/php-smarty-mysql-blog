services:
  nginx:
    image: nginx:1.27-alpine
    container_name: blog_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blog_php
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-blog}
      DB_USERNAME: ${DB_USERNAME:-blog}
      DB_PASSWORD: ${DB_PASSWORD:-blog}
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: blog_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-blog}
      MYSQL_USER: ${DB_USERNAME:-blog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blog}
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
